<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- Sutando menu-bar template icon.
       Single-color, designed for NSImage.isTemplate=true so macOS
       can tint it black on light menubars and white on dark.
       Two arcs forming an S, sized for clarity at 18×18 px. -->
  <g fill="none" stroke="#000000" stroke-linecap="round" stroke-width="2">
    <path d="M 16 7 a 5 5 0 1 0 0 5"/>
    <path d="M 6 15 a 5 5 0 1 0 0 -5" stroke-opacity="0.55"/>
  </g>
</svg>
